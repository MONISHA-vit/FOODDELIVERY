apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-deployment
spec:
  replicas: 2 # High availability: runs 2 instances
  selector:
    matchLabels:
      app: food-delivery
  template:
    metadata:
      labels:
        app: food-delivery
    spec:
      containers:
      - name: food-delivery-container
        image: monishavit/food-delivery-app:latest # Replace with your Docker Hub username/image
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: food-delivery-service
spec:
  type: NodePort
  selector:
    app: food-delivery
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30001
